name: CI

# when this workflow runs
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# permissions needed for GitHub Pages deploy
permissions:
  contents: read
  pages: write
  id-token: write

# prevents multiple deploys from running at the same time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend # all steps run inside backend/
    steps:
      - uses: actions/checkout@v4 # clones the repository

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      # add backend tests here when ready:
      # - run: pytest

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend # all steps run inside frontend/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      # add frontend tests here when ready:
      # - run: npm test -- --run

      - run: npm run build # generates frontend/dist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist # uploads dist/ to be deployed

  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend] # only runs if both jobs above pass
    if: github.event_name != 'pull_request' # skip deploy on PRs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment